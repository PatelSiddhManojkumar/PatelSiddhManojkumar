name: Generate Snake Animation

on:
  # Refresh the snake twice a day so it stays current with new contributions
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Emerald snake (#10B981) on the GitHub-dark contribution grid + a light variant
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#10B981&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/github-snake.svg?palette=github-light&color_snake=#10B981

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
